<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Uma promessa 🤍</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        overflow: hidden;
        height: 100vh;
      }

      /* Container full screen */
      #container {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      /* IMAGEM PREENCHE TELA TODA [file:47] */
      #minhaImagem {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%); /* Centraliza perfeitamente */
        max-width: 95vw; /* Máximo 95% da largura tela */
        max-height: 95vh; /* Máximo 95% da altura tela */
        width: auto; /* Mantém proporção original */
        height: auto;
        object-fit: contain; /* ✅ MOSTRA IMAGEM INTEIRA sem cortar! */
        z-index: 2;
        opacity: 0.92;
        display: none;
        border-radius: 15px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
      }

      /* RESPONSIVO CELULAR */
      @media (max-width: 768px) {
        #minhaImagem {
          object-position: center 20%;
        }
      }

      /* Botão central */
      #playButton {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(255, 255, 255, 0.95);
        border: none;
        padding: 20px 40px;
        border-radius: 50px;
        font-size: 1.2rem;
        cursor: pointer;
        z-index: 3;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      }

      #playButton:hover {
        transform: translate(-50%, -50%) scale(1.05);
      }
    </style>
  </head>
  <body>
    <!-- SÓ ÁUDIO (sem vídeo!) -->
    <audio id="musicaAmor" preload="auto" loop>
      <source src="musica.mp3" type="audio/mpeg" />
    </audio>

    <div id="container">
      <!-- TUA IMAGEM FULL SCREEN -->
      <img id="minhaImagem" src="Imagmenossa.png" alt="Nós" />

      <!-- Botão play -->
      <button id="playButton">🤍 Toque para ver oque nos aguarda</button>
    </div>

    <script>
      const playButton = document.getElementById("playButton");
      const imagem = document.getElementById("minhaImagem");
      const audio = document.getElementById("musicaAmor");

      playButton.addEventListener("click", () => {
        playButton.style.display = "none";
        imagem.style.display = "block";
        audio.volume = 0.4;
        audio.play();
      });
    </script>
  </body>
</html>
